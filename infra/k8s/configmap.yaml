apiVersion: v1
kind: ConfigMap
metadata:
  name: sam-gong-config
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/managed-by: devsop
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  TZ: "Asia/Taipei"

  # Server ports
  PORT: "2567"
  API_PORT: "3000"
  DB_PORT: "5432"
  REDIS_PORT: "6379"

  # Database
  DB_HOST: "postgres-service.sam-gong.svc.cluster.local"
  DB_NAME: "sam_gong"
  DB_USER: "sam_gong_app"

  # Redis
  REDIS_HOST: "redis-service.sam-gong.svc.cluster.local"

  # Colyseus
  COLYSEUS_MONITOR_ENABLED: "false"
  GAME_ROOMS_MAX: "100"

  # Anti-addiction (Taiwan regulation compliance)
  ANTI_ADDICTION_ENABLED: "true"

  # Game economics
  RAKE_RATE: "0.05"
  RAKE_MIN: "1"
