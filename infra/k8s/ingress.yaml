apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sam-gong-ingress
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/managed-by: devsop
  annotations:
    # Ingress controller
    kubernetes.io/ingress.class: "nginx"

    # TLS — cert-manager with Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # WebSocket support for Colyseus game server
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # Strip /api prefix before forwarding to API service
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://sam-gong.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Requested-With"

    # Rate limiting (NFR-19: 4-tier rate limits)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Security
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

spec:
  tls:
    - hosts:
        - sam-gong.example.com
      secretName: sam-gong-tls
  rules:
    - host: sam-gong.example.com
      http:
        paths:
          # REST API — strip /api prefix
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: sam-gong-api-service
                port:
                  name: http

          # Colyseus game server WebSocket endpoint
          - path: /colyseus
            pathType: Prefix
            backend:
              service:
                name: sam-gong-server-service
                port:
                  name: ws

          # Frontend SPA — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sam-gong-client-service
                port:
                  name: http
