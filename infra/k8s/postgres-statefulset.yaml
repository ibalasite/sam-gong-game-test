apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: sam-gong
  labels:
    app: postgres
    app.kubernetes.io/managed-by: devsop
data:
  postgresql.conf: |
    # Connection settings
    listen_addresses = '*'
    max_connections = 200

    # Memory settings
    shared_buffers = 256MB
    effective_cache_size = 768MB
    work_mem = 4MB
    maintenance_work_mem = 64MB

    # WAL settings
    wal_level = replica
    max_wal_size = 1GB
    min_wal_size = 80MB
    checkpoint_completion_target = 0.9

    # Query planner
    random_page_cost = 1.1
    effective_io_concurrency = 200

    # Logging
    log_timezone = 'Asia/Taipei'
    log_min_duration_statement = 1000
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on

    # Locale
    datestyle = 'iso, mdy'
    timezone = 'Asia/Taipei'
    default_text_search_config = 'pg_catalog.english'

    # pg_partman background worker
    shared_preload_libraries = 'pg_partman_bgw'
    pg_partman_bgw.interval = 3600
    pg_partman_bgw.role = 'sam_gong_app'
    pg_partman_bgw.dbname = 'sam_gong'

  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            md5
    host    all             all             ::1/128                 md5
    host    all             all             10.0.0.0/8              md5

  init.sql: |
    -- Create application role
    CREATE ROLE sam_gong_app WITH LOGIN PASSWORD 'REPLACED_AT_INIT';
    CREATE DATABASE sam_gong OWNER sam_gong_app;

    -- Connect to sam_gong and set up pg_partman
    \c sam_gong
    CREATE SCHEMA IF NOT EXISTS partman;
    CREATE EXTENSION IF NOT EXISTS pg_partman SCHEMA partman;
    GRANT ALL ON SCHEMA partman TO sam_gong_app;
    GRANT ALL ON ALL TABLES IN SCHEMA partman TO sam_gong_app;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sam-gong
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: devsop
spec:
  # MVP: single replica
  # For HA: consider Patroni or CloudNativePG operator (replicas: 3)
  replicas: 1
  serviceName: postgres-service
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: init-config
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              cp /config/postgresql.conf /etc/postgresql/postgresql.conf
              cp /config/pg_hba.conf /etc/postgresql/pg_hba.conf
          volumeMounts:
            - name: postgres-config-vol
              mountPath: /config
            - name: postgres-etc
              mountPath: /etc/postgresql
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          env:
            - name: POSTGRES_DB
              value: sam_gong
            - name: POSTGRES_USER
              value: sam_gong_app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sam-gong-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: TZ
              value: Asia/Taipei
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sam_gong_app", "-d", "sam_gong"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sam_gong_app", "-d", "sam_gong"]
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-etc
              mountPath: /etc/postgresql
      volumes:
        - name: postgres-config-vol
          configMap:
            name: postgres-config
        - name: postgres-etc
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: sam-gong
  labels:
    app: postgres
    app.kubernetes.io/managed-by: devsop
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet DNS
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
