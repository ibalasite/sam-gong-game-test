apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-gong-server
  namespace: sam-gong
  labels:
    app: sam-gong-server
    app.kubernetes.io/name: sam-gong-server
    app.kubernetes.io/component: game-server
    app.kubernetes.io/managed-by: devsop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sam-gong-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: sam-gong-server
        app.kubernetes.io/name: sam-gong-server
        app.kubernetes.io/component: game-server
    spec:
      terminationGracePeriodSeconds: 30
      # Spread pods across nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: sam-gong-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: sam-gong-server
          image: sam-gong-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2567
              name: ws
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: sam-gong-config
            - secretRef:
                name: sam-gong-secrets
          env:
            - name: PORT
              value: "2567"
          readinessProbe:
            httpGet:
              path: /health
              port: 2567
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 2567
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                # Allow in-flight WebSocket connections to drain
                command: ["/bin/sh", "-c", "sleep 5"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
