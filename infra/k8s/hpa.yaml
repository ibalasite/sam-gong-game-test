apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sam-gong-server-hpa
  namespace: sam-gong
  labels:
    app: sam-gong-server
    app.kubernetes.io/managed-by: devsop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sam-gong-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # 5-min cooldown to avoid flapping
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sam-gong-api-hpa
  namespace: sam-gong
  labels:
    app: sam-gong-api
    app.kubernetes.io/managed-by: devsop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sam-gong-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
