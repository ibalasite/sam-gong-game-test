# IMPORTANT: This file is a TEMPLATE ONLY.
# Real secret values are managed by the devsop-secrets pipeline using
# Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets) or
# External Secrets Operator (https://external-secrets.io/).
#
# DO NOT commit real secret values to this file or to any git repository.
#
# To generate sealed secrets:
#   kubeseal --format yaml < secret-plain.yaml > secret-sealed.yaml
#
# To use External Secrets with AWS Secrets Manager:
#   See infra/k8s/external-secret.yaml (generated by devsop-gen-secrets)

apiVersion: v1
kind: Secret
metadata:
  name: sam-gong-secrets
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/managed-by: devsop
  annotations:
    # Managed by: devsop-secrets pipeline
    # Rotation policy: 90 days
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  # Database password — replace with actual value via devsop-secrets
  DB_PASSWORD: "REPLACE_WITH_SEALED_SECRET"

  # JWT RS256 keys — generate with: openssl genrsa -out private.pem 4096
  JWT_PRIVATE_KEY: "REPLACE_WITH_SEALED_SECRET"
  JWT_PUBLIC_KEY: "REPLACE_WITH_SEALED_SECRET"

  # Redis authentication password
  REDIS_PASSWORD: "REPLACE_WITH_SEALED_SECRET"

  # OTP provider API key (age verification, Taiwan regulation)
  OTP_API_KEY: "REPLACE_WITH_SEALED_SECRET"
