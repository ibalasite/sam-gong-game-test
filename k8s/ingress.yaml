apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sam-gong-ingress
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/component: ingress
  annotations:
    # WebSocket support — keep connections alive up to 1 hour
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Sticky sessions by client IP (supplement K8s service-level affinity)
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    # Enable WebSocket upgrade
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: sam-gong.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sam-gong-server
                port:
                  number: 2567
