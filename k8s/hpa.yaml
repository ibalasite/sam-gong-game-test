apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sam-gong-hpa
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sam-gong-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
