apiVersion: v1
kind: Service
metadata:
  name: sam-gong-server
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  # Required for WebSocket sticky sessions — routes same client IP to same pod
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      # 1-hour stickiness matches Colyseus reconnect window
      timeoutSeconds: 3600
  selector:
    app: sam-gong-server
  ports:
    - name: ws
      port: 2567
      targetPort: 2567
      protocol: TCP
