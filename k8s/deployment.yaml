apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-gong-server
  namespace: sam-gong
  labels:
    app.kubernetes.io/name: sam-gong
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sam-gong-server
  template:
    metadata:
      labels:
        app: sam-gong-server
        app.kubernetes.io/name: sam-gong
        app.kubernetes.io/component: server
    spec:
      # Allow Colyseus 60s reconnect window to complete before pod terminates
      terminationGracePeriodSeconds: 70
      containers:
        - name: sam-gong-server
          image: sam-gong-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ws
              containerPort: 2567
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sam-gong-config
            - secretRef:
                name: sam-gong-secrets
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 2567
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 2567
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: sqlite-storage
              mountPath: /data
      volumes:
        - name: sqlite-storage
          emptyDir: {}
