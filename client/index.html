<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三公 Sam Gong</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/colyseus.js@0.15.21/dist/colyseus.js"></script>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div id="login" style="display:flex">
  <div class="lbox">
    <div class="gtitle">三公</div>
    <div class="gsub">Sam Gong — Multiplayer Card Game</div>
    <input id="nick" type="text" placeholder="暱稱（留空自動產生）" maxlength="20" autofocus>
    <button id="joinbtn" class="btn pri">🎴 進入遊戲</button>
    <div id="errmsg" style="font-size:.82rem;color:#ffcc80;text-align:center;min-height:18px"></div>
    <div id="apistatus" style="font-size:.75rem;color:#555;text-align:center"></div>
    <div style="font-size:.72rem;color:#444;text-align:center;border-top:1px solid rgba(255,255,255,.08);padding-top:10px">
      本機開發版 — ws://localhost:2567
    </div>
  </div>
</div>

<!-- ══ GAME ═══════════════════════════════════════════ -->
<div id="game" style="display:none">

  <!-- felt table -->
  <div class="felt">
    <!-- 6 seat positions -->
    <div class="seat s-bot"  id="s-bot"></div>
    <div class="seat s-bl"   id="s-bl"></div>
    <div class="seat s-tl"   id="s-tl"></div>
    <div class="seat s-top"  id="s-top"></div>
    <div class="seat s-tr"   id="s-tr"></div>
    <div class="seat s-br"   id="s-br"></div>

    <!-- center oval -->
    <div class="oval">
      <div class="oplbl" id="c-phase">等待玩家</div>
      <div class="opot"  id="c-pot">0</div>
      <div class="ohall" id="c-hall">青銅廳</div>
    </div>
  </div>

  <!-- ── floating chat panel ─────────────────── -->
  <div class="fpanel left">
    <div class="ptitle">💬 聊天室</div>
    <div id="chat-log" class="clog"></div>
    <div class="crow">
      <input id="chatinp" type="text" placeholder="輸入訊息..." maxlength="60">
      <button id="chatsend" class="btn sec sm">送</button>
    </div>
  </div>

  <!-- ── floating action panel ──────────────── -->
  <div class="fpanel right">
    <div class="ptitle">🎮 操作</div>
    <div id="actions" class="abox">
      <p class="hint">等待中...</p>
    </div>
    <div class="rinfo">
      房間 <span id="roomid" style="font-family:monospace;color:#80cbc4">—</span>
    </div>
  </div>

  <!-- ── result overlay ─────────────────────── -->
  <div id="result" style="display:none" class="result-ov">
    <div id="rtitle" class="rtitle"></div>
    <div id="rdetail" style="font-size:1.1rem;color:#ccc;margin:8px 0 20px"></div>
    <button class="btn pri" onclick="document.getElementById('result').style.display='none'">繼續</button>
  </div>

  <!-- ── top bar ────────────────────────────── -->
  <div class="topbar">
    <span><span class="cdot on" id="cdot"></span><span id="clbl">已連線</span></span>
    <span class="devbadge">DEV LOCAL</span>
    <button class="leavebtn" onclick="leaveGame()">離開</button>
  </div>

</div>

<!-- global toasts -->
<div id="toasts" class="toasts"></div>

<script src="js/game.js"></script>
</body>
</html>
