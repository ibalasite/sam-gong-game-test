name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./coverage
          fail_ci_if_error: false

  build:
    name: Build TypeScript
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.server
          push: false
          tags: sam-gong-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
          tags: sam-gong-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.client
          push: false
          tags: sam-gong-client:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke test server image
        run: docker run --rm sam-gong-server:ci node -e "require('./dist/index')"

      - name: Smoke test API image
        run: docker run --rm sam-gong-api:ci node -e "require('./dist/index')"

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start services via Docker Compose
        run: docker compose -f infra/docker-compose.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000/health; do sleep 2; done'

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: NPM audit (high severity)
        run: npm audit --audit-level=high

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image for scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.server
          push: false
          tags: sam-gong-server:scan
          load: true

      - name: Trivy scan - server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sam-gong-server:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build API image for scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
          tags: sam-gong-api:scan
          load: true

      - name: Trivy scan - API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sam-gong-api:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
