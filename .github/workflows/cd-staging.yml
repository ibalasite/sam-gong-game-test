name: CD — Staging

on:
  push:
    branches:
      - develop

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  NAMESPACE: sam-gong-staging

jobs:
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=develop-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-server:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-api:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-client:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update server deployment image
        run: |
          kubectl set image deployment/sam-gong-server \
            sam-gong-server=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-server:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Update API deployment image
        run: |
          kubectl set image deployment/sam-gong-api \
            sam-gong-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-api:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Update client deployment image
        run: |
          kubectl set image deployment/sam-gong-client \
            sam-gong-client=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-client:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for server rollout
        run: |
          kubectl rollout status deployment/sam-gong-server \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/sam-gong-api \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Wait for client rollout
        run: |
          kubectl rollout status deployment/sam-gong-client \
            -n ${{ env.NAMESPACE }} --timeout=120s

  smoke-test-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Health check staging server
        run: |
          echo "Running health check on staging..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "${{ secrets.STAGING_URL }}/health" \
            --max-time 30 --retry 3 --retry-delay 5)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status: $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Health check staging API
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "${{ secrets.STAGING_API_URL }}/health" \
            --max-time 30 --retry 3 --retry-delay 5)
          if [ "$STATUS" != "200" ]; then
            echo "API health check failed with status: $STATUS"
            exit 1
          fi
          echo "API health check passed (HTTP $STATUS)"

      - name: Notify Slack — success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": ":white_check_mark: *Staging deploy succeeded*\nBranch: `'"${{ github.ref_name }}"'`\nCommit: `'"${{ github.sha }}"'`\nImage tag: `'"${{ needs.build-push.outputs.image_tag }}"'`"
            }'
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}

      - name: Notify Slack — failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": ":x: *Staging deploy FAILED*\nBranch: `'"${{ github.ref_name }}"'`\nCommit: `'"${{ github.sha }}"'`\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
