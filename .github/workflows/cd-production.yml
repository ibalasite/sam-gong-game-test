name: CD — Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag to deploy (leave empty to build from current HEAD)'
        required: false
        default: ''

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  NAMESPACE: sam-gong-production

jobs:
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          # Use package.json version if available
          VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${VERSION}-${SHA_SHORT}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-server:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-client:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    env:
      IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update server deployment image
        run: |
          kubectl set image deployment/sam-gong-server \
            sam-gong-server=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-server:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for server rollout
        id: rollout-server
        run: |
          kubectl rollout status deployment/sam-gong-server \
            -n ${{ env.NAMESPACE }} --timeout=180s
        continue-on-error: true

      - name: Rollback server on failure
        if: steps.rollout-server.outcome == 'failure'
        run: |
          echo "Server rollout failed — initiating rollback..."
          kubectl rollout undo deployment/sam-gong-server -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/sam-gong-server \
            -n ${{ env.NAMESPACE }} --timeout=120s
          echo "Rollback completed for server"
          exit 1

      - name: Update API deployment image
        run: |
          kubectl set image deployment/sam-gong-api \
            sam-gong-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-api:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for API rollout
        id: rollout-api
        run: |
          kubectl rollout status deployment/sam-gong-api \
            -n ${{ env.NAMESPACE }} --timeout=180s
        continue-on-error: true

      - name: Rollback API on failure
        if: steps.rollout-api.outcome == 'failure'
        run: |
          echo "API rollout failed — initiating rollback..."
          kubectl rollout undo deployment/sam-gong-api -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/sam-gong-server -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/sam-gong-api \
            -n ${{ env.NAMESPACE }} --timeout=120s
          echo "Rollback completed for API"
          exit 1

      - name: Update client deployment image
        run: |
          kubectl set image deployment/sam-gong-client \
            sam-gong-client=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sam-gong-client:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for client rollout
        id: rollout-client
        run: |
          kubectl rollout status deployment/sam-gong-client \
            -n ${{ env.NAMESPACE }} --timeout=180s
        continue-on-error: true

      - name: Rollback client on failure
        if: steps.rollout-client.outcome == 'failure'
        run: |
          echo "Client rollout failed — initiating rollback..."
          kubectl rollout undo deployment/sam-gong-client -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/sam-gong-api -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/sam-gong-server -n ${{ env.NAMESPACE }}
          echo "Rollback completed for all services"
          exit 1

      - name: Production health check
        run: |
          echo "Running production health check..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "${{ secrets.PRODUCTION_URL }}/health" \
            --max-time 30 --retry 5 --retry-delay 10)
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed with status: $STATUS"
            exit 1
          fi
          echo "Production health check passed (HTTP $STATUS)"

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [build-push, deploy-production]
    if: always()
    steps:
      - name: Notify Slack — success
        if: needs.deploy-production.result == 'success'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": ":rocket: *Production deploy succeeded*\nBranch: `'"${{ github.ref_name }}"'`\nCommit: `'"${{ github.sha }}"'`\nImage tag: `'"${{ needs.build-push.outputs.image_tag }}"'`\nDeployed by: `'"${{ github.actor }}"'`"
            }'

      - name: Notify Slack — failure
        if: needs.deploy-production.result == 'failure'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": ":fire: *Production deploy FAILED — rollback triggered*\nBranch: `'"${{ github.ref_name }}"'`\nCommit: `'"${{ github.sha }}"'`\nImage tag: `'"${{ needs.build-push.outputs.image_tag }}"'`\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
